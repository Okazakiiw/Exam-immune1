        {

                A: "IgE binding to FcεRI on basophils",
                B: "IgG (especially IgG1/IgG3) binding pathogen via Fab, with Fc engaging FcγR on phagocytes; and C3b binding CR1/CR3 both surfaces opsonized by complement (often classical pathway via IgG/IgM) and antibody together",
                C: "IgM binding directly to phagocyte mannose receptors",
                D: "Membrane Attack Complex-mediated lysis as the dominant mechanism",
                E: "NK cell-mediated cytotoxicity via NKG2D"
            },
            answer: "B",
            explanation: "Opsonization & Encapsulated Organisms: แบคทีเรียที่มีแคปซูลป้องกันการถูกกินโดยตรง ต้องอาศัยการ opsonize โดย opsonins หลักคือ IgG (จับผ่าน FcγR) และ C3b/iC3b (จับผ่าน CR1/CR3 บน phagocyte) ผู้ที่ถูกตัดม้ามจะสูญเสียเซลล์สร้างแอนติบอดีจำเพาะกลุ่มนี้ ทำให้ติดเชื้อรุนแรง"
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const questionNumberEl = document.getElementById('question-number');
    const questionTextEl = document.getElementById('question-text');
    const optionsListEl = document.getElementById('options-list');
    const submitBtn = document.getElementById('submit-btn');
    const explanationContainer = document.getElementById('explanation-container');
    const explanationText = document.getElementById('explanation-text');
    const correctAnswerDisplay = document.getElementById('correct-answer-display');
    const quizScreen = document.getElementById('quiz-screen');
    const scoreScreen = document.getElementById('score-screen');

    function loadQuestion() {
        const q = questions[currentQuestionIndex];
        questionNumberEl.textContent = `ข้อที่ ${currentQuestionIndex + 1} / ${questions.length}`;
        questionTextEl.textContent = q.question;
        
        optionsListEl.innerHTML = '';
        for (const [key, value] of Object.entries(q.options)) {
            const li = document.createElement('li');
            li.innerHTML = `
                <label>
                    <input type="radio" name="option" value="${key}">
                    <strong>${key}.</strong> ${value}
                </label>
            `;
            optionsListEl.appendChild(li);
        }
        
        submitBtn.style.display = 'inline-block';
        submitBtn.disabled = false;
        explanationContainer.style.display = 'none';
        explanationContainer.className = 'explanation-box';
    }

    function checkAnswer() {
        const selectedOption = document.querySelector('input[name="option"]:checked');
        if (!selectedOption) {
            alert('กรุณาเลือกคำตอบก่อนครับ');
            return;
        }

        const answer = selectedOption.value;
        const q = questions[currentQuestionIndex];
        
        submitBtn.style.display = 'none';
        explanationContainer.style.display = 'block';
        explanationText.textContent = q.explanation;
        correctAnswerDisplay.textContent = `คำตอบที่ถูกต้องคือ: ${q.answer}`;

        // Disable all radio buttons
        const radios = document.querySelectorAll('input[name="option"]');
        radios.forEach(r => r.disabled = true);

        if (answer === q.answer) {
            score++;
            explanationContainer.classList.add('correct-box');
            explanationContainer.classList.remove('incorrect-box');
        } else {
            explanationContainer.classList.add('incorrect-box');
            explanationContainer.classList.remove('correct-box');
            // Highlight the wrong answer
            selectedOption.parentElement.style.background = '#f5c6cb';
        }
        
        // Highlight the correct answer
        document.querySelector(`input[value="${q.answer}"]`).parentElement.style.background = '#c3e6cb';
        document.querySelector(`input[value="${q.answer}"]`).parentElement.style.border = '1px solid #28a745';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        quizScreen.style.display = 'none';
        scoreScreen.style.display = 'block';
        document.getElementById('final-score').textContent = score;
        document.getElementById('total-questions').textContent = questions.length;
    }

    // Initialize the first question
    loadQuestion();
</script>

</body>
</html>
